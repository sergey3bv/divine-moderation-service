<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divine Moderation Dashboard</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      padding: 20px;
    }

    .header {
      margin-bottom: 30px;
      border-bottom: 2px solid #333;
      padding-bottom: 20px;
    }

    h1 {
      color: #fff;
      font-size: 28px;
      margin-bottom: 10px;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-top: 15px;
    }

    .stat-card {
      background: #1a1a1a;
      padding: 15px 20px;
      border-radius: 8px;
      border: 1px solid #333;
    }

    .stat-label {
      color: #888;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      color: #fff;
      font-size: 24px;
      font-weight: 600;
      margin-top: 5px;
    }

    .controls {
      display: flex;
      gap: 15px;
      margin-bottom: 20px;
      flex-wrap: wrap;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    label {
      font-size: 12px;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    select, input {
      background: #1a1a1a;
      color: #e0e0e0;
      border: 1px solid #333;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    select:hover, input:hover {
      border-color: #555;
    }

    button {
      background: #2563eb;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      transition: background 0.2s;
    }

    button:hover {
      background: #1d4ed8;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }

    .video-card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s;
    }

    .video-card:hover {
      transform: translateY(-2px);
      border-color: #555;
    }

    .video-card.quarantined {
      border-color: #dc2626;
      background: #1a0a0a;
    }

    .video-card.review {
      border-color: #f59e0b;
      background: #1a1505;
    }

    .video-thumbnail {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #0a0a0a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    .video-overlay {
      position: absolute;
      top: 10px;
      right: 10px;
      display: flex;
      gap: 5px;
    }

    .badge {
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .badge.safe {
      background: #166534;
      color: #dcfce7;
    }

    .badge.review {
      background: #b45309;
      color: #fef3c7;
    }

    .badge.quarantine {
      background: #991b1b;
      color: #fee2e2;
    }

    .video-info {
      padding: 15px;
    }

    .video-hash {
      font-family: monospace;
      font-size: 11px;
      color: #666;
      margin-bottom: 10px;
      word-break: break-all;
      cursor: pointer;
      user-select: all;
    }

    .video-hash:hover {
      color: #aaa;
      background: #222;
      padding: 2px 4px;
      border-radius: 3px;
    }

    .scores {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .score-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score-label {
      font-size: 13px;
      color: #888;
    }

    .score-bar {
      flex: 1;
      height: 6px;
      background: #0a0a0a;
      border-radius: 3px;
      margin: 0 10px;
      overflow: hidden;
    }

    .score-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s;
    }

    .score-fill.nudity {
      background: linear-gradient(90deg, #f59e0b, #dc2626);
    }

    .score-fill.violence {
      background: linear-gradient(90deg, #ef4444, #991b1b);
    }

    .score-fill.ai {
      background: linear-gradient(90deg, #3b82f6, #8b5cf6);
    }

    .score-value {
      font-size: 13px;
      color: #e0e0e0;
      font-weight: 600;
      min-width: 40px;
      text-align: right;
    }

    .reason {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
      font-size: 12px;
      color: #999;
      font-style: italic;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #666;
    }

    .empty {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }

    .empty h2 {
      font-size: 24px;
      margin-bottom: 10px;
    }

    .timestamp {
      font-size: 11px;
      color: #666;
      margin-top: 8px;
    }

    .logout {
      background: #333;
      color: #e0e0e0;
    }

    .logout:hover {
      background: #444;
    }

    .nostr-context {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }

    .nostr-title {
      font-size: 14px;
      color: #e0e0e0;
      font-weight: 500;
      margin-bottom: 6px;
      line-height: 1.3;
    }

    .nostr-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 6px;
    }

    .nostr-meta-item {
      font-size: 11px;
      color: #888;
      display: flex;
      align-items: center;
      gap: 3px;
    }

    .nostr-meta-label {
      color: #666;
    }

    .nostr-meta-value {
      color: #aaa;
    }

    .nostr-loading {
      font-size: 11px;
      color: #666;
      font-style: italic;
    }

    .nostr-not-found {
      font-size: 11px;
      color: #666;
      font-style: italic;
    }

    .divine-link {
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #333;
    }

    .divine-link a {
      color: #3b82f6;
      text-decoration: none;
      font-size: 12px;
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }

    .divine-link a:hover {
      color: #60a5fa;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <h1>Divine Moderation Dashboard</h1>
      <button class="logout" onclick="logout()">Logout</button>
    </div>
    <div class="stats" id="stats">
      <div class="stat-card">
        <div class="stat-label">Total Videos</div>
        <div class="stat-value" id="total-count">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Safe</div>
        <div class="stat-value" id="safe-count" style="color: #22c55e;">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Review</div>
        <div class="stat-value" id="review-count" style="color: #f59e0b;">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Quarantined</div>
        <div class="stat-value" id="quarantine-count" style="color: #ef4444;">-</div>
      </div>
    </div>
  </div>

  <div class="controls">
    <div class="control-group">
      <label for="sort-by">Sort By</label>
      <select id="sort-by" onchange="applyFilters()">
        <option value="timestamp">Recent First</option>
        <option value="nudity-high">Nudity (High → Low)</option>
        <option value="nudity-low">Nudity (Low → High)</option>
        <option value="violence-high">Violence (High → Low)</option>
        <option value="violence-low">Violence (Low → High)</option>
        <option value="ai-high">AI-Generated (High → Low)</option>
        <option value="ai-low">AI-Generated (Low → High)</option>
      </select>
    </div>

    <div class="control-group">
      <label for="filter-action">Filter by Action</label>
      <select id="filter-action" onchange="applyFilters()">
        <option value="all">All</option>
        <option value="SAFE">Safe</option>
        <option value="REVIEW">Review</option>
        <option value="QUARANTINE">Quarantined</option>
      </select>
    </div>

    <div class="control-group">
      <label for="min-score">Min Score Threshold</label>
      <input type="number" id="min-score" min="0" max="1" step="0.1" value="0" onchange="applyFilters()" placeholder="0.0 - 1.0">
    </div>

    <div class="control-group">
      <label>&nbsp;</label>
      <button onclick="loadVideos()">Refresh</button>
    </div>
  </div>

  <div id="loading" class="loading">
    Loading moderation data...
  </div>

  <div id="empty" class="empty" style="display: none;">
    <h2>No videos found</h2>
    <p>No moderation results match your filters</p>
  </div>

  <div class="video-grid" id="video-grid"></div>

  <script>
    let allVideos = [];
    const nostrContextCache = new Map(); // Cache Nostr contexts to avoid redundant fetches

    /**
     * Nostr context is now stored in KV during moderation
     * No need to fetch from relay in dashboard
     */

    /**
     * Parse kind 34236 event to extract metadata
     */
    function parseNostrEvent(event) {
      if (!event || !event.tags) return null;

      const metadata = {
        title: null,
        author: null,
        platform: null,
        loops: null,
        likes: null,
        comments: null,
        url: null,
        publishedAt: null,
        videoUrl: null,
        imageUrl: null,
        content: event.content || null
      };

      for (const tag of event.tags) {
        const [key, value] = tag;

        switch (key) {
          case 'title':
            metadata.title = value;
            break;
          case 'author':
            metadata.author = value;
            break;
          case 'platform':
            metadata.platform = value;
            break;
          case 'loops':
            metadata.loops = parseInt(value, 10);
            break;
          case 'likes':
            metadata.likes = parseInt(value, 10);
            break;
          case 'comments':
            metadata.comments = parseInt(value, 10);
            break;
          case 'r':
            metadata.url = value;
            break;
          case 'published_at':
            metadata.publishedAt = parseInt(value, 10);
            break;
          case 'imeta':
            // Parse imeta tag parameters: ["imeta", "url ...", "m ...", "x ...", "image ..."]
            for (let i = 1; i < tag.length; i++) {
              const param = tag[i];
              if (param && param.startsWith('url ')) {
                metadata.videoUrl = param.substring(4).trim();
              } else if (param && param.startsWith('image ')) {
                metadata.imageUrl = param.substring(6).trim();
              }
            }
            break;
        }
      }

      return metadata;
    }

    async function loadVideos() {
      const loading = document.getElementById('loading');
      const empty = document.getElementById('empty');
      const grid = document.getElementById('video-grid');

      loading.style.display = 'block';
      empty.style.display = 'none';
      grid.innerHTML = '';

      try {
        const response = await fetch('/admin/api/videos');

        if (response.status === 401) {
          window.location.href = '/admin/login';
          return;
        }

        const data = await response.json();
        allVideos = data.videos || [];

        updateStats();
        applyFilters();

      } catch (error) {
        console.error('Failed to load videos:', error);
        loading.innerHTML = 'Error loading videos: ' + error.message;
      } finally {
        loading.style.display = 'none';
      }
    }

    function updateStats() {
      const total = allVideos.length;
      const safe = allVideos.filter(v => v.action === 'SAFE').length;
      const review = allVideos.filter(v => v.action === 'REVIEW').length;
      const quarantine = allVideos.filter(v => v.action === 'QUARANTINE').length;

      document.getElementById('total-count').textContent = total;
      document.getElementById('safe-count').textContent = safe;
      document.getElementById('review-count').textContent = review;
      document.getElementById('quarantine-count').textContent = quarantine;
    }

    function applyFilters() {
      const sortBy = document.getElementById('sort-by').value;
      const filterAction = document.getElementById('filter-action').value;
      const minScore = parseFloat(document.getElementById('min-score').value) || 0;

      let filtered = [...allVideos];

      // Filter by action
      if (filterAction !== 'all') {
        filtered = filtered.filter(v => v.action === filterAction);
      }

      // Filter by minimum score (any category)
      if (minScore > 0) {
        filtered = filtered.filter(v => {
          const maxScore = Math.max(
            v.scores.nudity || 0,
            v.scores.violence || 0,
            v.scores.ai_generated || 0
          );
          return maxScore >= minScore;
        });
      }

      // Sort
      filtered.sort((a, b) => {
        switch (sortBy) {
          case 'timestamp':
            return (b.processedAt || 0) - (a.processedAt || 0);
          case 'nudity-high':
            return (b.scores.nudity || 0) - (a.scores.nudity || 0);
          case 'nudity-low':
            return (a.scores.nudity || 0) - (b.scores.nudity || 0);
          case 'violence-high':
            return (b.scores.violence || 0) - (a.scores.violence || 0);
          case 'violence-low':
            return (a.scores.violence || 0) - (b.scores.violence || 0);
          case 'ai-high':
            return (b.scores.ai_generated || 0) - (a.scores.ai_generated || 0);
          case 'ai-low':
            return (a.scores.ai_generated || 0) - (b.scores.ai_generated || 0);
          default:
            return 0;
        }
      });

      renderVideos(filtered);
    }

    async function renderVideos(videos) {
      const grid = document.getElementById('video-grid');
      const empty = document.getElementById('empty');

      if (videos.length === 0) {
        grid.innerHTML = '';
        empty.style.display = 'block';
        return;
      }

      empty.style.display = 'none';
      grid.innerHTML = videos.map(video => createVideoCard(video)).join('');

      // Set up video pause handlers after rendering
      setTimeout(setupVideoPauseHandlers, 100);

      // Render Nostr context from KV (already fetched during moderation)
      videos.forEach((video) => {
        const nostrContainer = document.getElementById(`nostr-${video.sha256}`);
        if (!nostrContainer) return;

        if (video.nostrContext) {
          nostrContainer.innerHTML = createNostrMetadataHTML(video.nostrContext);
        } else {
          nostrContainer.innerHTML = '<div class="nostr-not-found">No Nostr event found</div>';
        }

        // Update divine.video link with event ID if available
        const divineLink = document.getElementById(`divine-link-${video.sha256}`);
        if (divineLink && video.nostrContext && video.nostrContext.eventId) {
          divineLink.href = `https://divine.video/video/${video.nostrContext.eventId}?source=discovery&index=0`;
        }
      });
    }

    /**
     * Create HTML for Nostr metadata display
     */
    function createNostrMetadataHTML(metadata) {
      const parts = [];

      if (metadata.title) {
        parts.push(`<div class="nostr-title">${escapeHtml(metadata.title)}</div>`);
      }

      const metaItems = [];

      if (metadata.author) {
        metaItems.push(`<span class="nostr-meta-item"><span class="nostr-meta-label">by</span> <span class="nostr-meta-value">${escapeHtml(metadata.author)}</span></span>`);
      }

      if (metadata.platform) {
        metaItems.push(`<span class="nostr-meta-item"><span class="nostr-meta-label">on</span> <span class="nostr-meta-value">${escapeHtml(metadata.platform)}</span></span>`);
      }

      if (metadata.loops !== null && !isNaN(metadata.loops)) {
        metaItems.push(`<span class="nostr-meta-item"><span class="nostr-meta-value">${formatNumber(metadata.loops)}</span> <span class="nostr-meta-label">loops</span></span>`);
      }

      if (metadata.likes !== null && !isNaN(metadata.likes)) {
        metaItems.push(`<span class="nostr-meta-item"><span class="nostr-meta-value">${formatNumber(metadata.likes)}</span> <span class="nostr-meta-label">likes</span></span>`);
      }

      if (metadata.comments !== null && !isNaN(metadata.comments)) {
        metaItems.push(`<span class="nostr-meta-item"><span class="nostr-meta-value">${formatNumber(metadata.comments)}</span> <span class="nostr-meta-label">comments</span></span>`);
      }

      if (metaItems.length > 0) {
        parts.push(`<div class="nostr-meta">${metaItems.join('')}</div>`);
      }

      return parts.join('');
    }

    /**
     * Format large numbers with K/M suffixes
     */
    function formatNumber(num) {
      if (num >= 1000000) {
        return (num / 1000000).toFixed(1) + 'M';
      }
      if (num >= 1000) {
        return (num / 1000).toFixed(1) + 'K';
      }
      return num.toString();
    }

    /**
     * Escape HTML to prevent XSS
     */
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function createVideoCard(video) {
      const { sha256, cdnUrl, action, scores, reason, processedAt } = video;

      const timestamp = processedAt
        ? new Date(processedAt).toLocaleString()
        : 'Unknown';

      const actionClass = action.toLowerCase();

      // Use admin bypass route for video URL - allows moderators to see quarantined content
      const adminVideoUrl = `/admin/video/${sha256}.mp4`;

      return `
        <div class="video-card ${actionClass}">
          <div class="video-thumbnail">
            <video src="${adminVideoUrl}" controls loop preload="metadata"></video>
            <div class="video-overlay">
              <span class="badge ${actionClass}">${action}</span>
            </div>
          </div>
          <div class="video-info">
            <div class="video-hash" title="Click to copy full hash" onclick="copyToClipboard('${sha256}')">${sha256}</div>

            <div class="scores">
              <div class="score-row">
                <span class="score-label">Nudity</span>
                <div class="score-bar">
                  <div class="score-fill nudity" style="width: ${(scores.nudity * 100).toFixed(1)}%"></div>
                </div>
                <span class="score-value">${(scores.nudity * 100).toFixed(1)}%</span>
              </div>

              <div class="score-row">
                <span class="score-label">Violence</span>
                <div class="score-bar">
                  <div class="score-fill violence" style="width: ${(scores.violence * 100).toFixed(1)}%"></div>
                </div>
                <span class="score-value">${(scores.violence * 100).toFixed(1)}%</span>
              </div>

              <div class="score-row">
                <span class="score-label">AI</span>
                <div class="score-bar">
                  <div class="score-fill ai" style="width: ${(scores.ai_generated * 100).toFixed(1)}%"></div>
                </div>
                <span class="score-value">${(scores.ai_generated * 100).toFixed(1)}%</span>
              </div>
            </div>

            ${reason ? `<div class="reason">${reason}</div>` : ''}

            <div class="nostr-context" id="nostr-${sha256}">
              <div class="nostr-loading">Loading context...</div>
            </div>

            <div class="divine-link">
              <a id="divine-link-${sha256}" href="https://divine.video/video/${sha256}?source=discovery&index=0" target="_blank" rel="noopener noreferrer">
                View on divine.video →
              </a>
            </div>

            <div class="timestamp">${timestamp}</div>
          </div>
        </div>
      `;
    }

    function logout() {
      document.cookie = 'admin_token=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
      window.location.href = '/admin/login';
    }

    function copyToClipboard(text) {
      navigator.clipboard.writeText(text).then(() => {
        console.log(`Copied SHA256 to clipboard: ${text}`);
        // Show brief visual feedback
        event.target.style.background = '#2563eb';
        event.target.style.color = '#fff';
        setTimeout(() => {
          event.target.style.background = '';
          event.target.style.color = '';
        }, 200);
      }).catch(err => {
        console.error('Failed to copy:', err);
      });
    }

    // Auto-pause other videos when one starts playing
    function setupVideoPauseHandlers() {
      const videos = document.querySelectorAll('video');

      videos.forEach(video => {
        video.addEventListener('play', function() {
          // Pause all other videos
          videos.forEach(otherVideo => {
            if (otherVideo !== video && !otherVideo.paused) {
              otherVideo.pause();
            }
          });
        });
      });
    }

    // Load videos on page load
    loadVideos();
  </script>
</body>
</html>
