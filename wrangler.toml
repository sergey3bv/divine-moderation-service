# Divine Video Moderation Service
name = "divine-moderation-service"
main = "src/index.mjs"
compatibility_date = "2024-10-01"
compatibility_flags = ["nodejs_compat"]

# Serve production traffic only on divine.video hostnames.
workers_dev = false

# Custom domains (requires divine.video zone in the same Cloudflare account)
routes = [
  { pattern = "moderation.admin.divine.video/*", zone_name = "divine.video" },
  { pattern = "moderation-api.divine.video/*", zone_name = "divine.video" }
]

# KV for storing moderation results
[[kv_namespaces]]
binding = "MODERATION_KV"
id = "10af689fc82140ed9159eef3c1c47079"

# D1 database for Blossom webhook events (video uploads)
[[d1_databases]]
binding = "BLOSSOM_DB"
database_name = "blossom-webhook-events"
database_id = "829f06cf-294b-4491-8611-30fc53df2589"

# Queue producer configuration (for testing)
[[queues.producers]]
binding = "MODERATION_QUEUE"
queue = "video-moderation-queue"

# Queue consumer configuration
[[queues.consumers]]
queue = "video-moderation-queue"
max_batch_size = 10
max_batch_timeout = 30
max_retries = 3

# Environment variables
[vars]
MODERATION_ENABLED = "true"
CDN_DOMAIN = "media.divine.video"  # CDN domain for video access
PRIMARY_MODERATION_PROVIDER = "hiveai"  # Use Hive.AI for content moderation + AI detection

# Zero Trust JWT verification (for /api/v1/moderate endpoint)
TEAM_DOMAIN = "https://divinevideo.cloudflareaccess.com"  # Cloudflare Access team domain

# Thresholds for content classification (0.0 - 1.0)
# NSFW / Adult Content
NSFW_THRESHOLD_HIGH = "0.8"           # Age-restricted
NSFW_THRESHOLD_MEDIUM = "0.6"         # Human review

# Violence
VIOLENCE_THRESHOLD_HIGH = "0.8"       # Age-restricted
VIOLENCE_THRESHOLD_MEDIUM = "0.6"     # Human review

# Gore & Disgusting
GORE_THRESHOLD_HIGH = "0.8"           # Age-restricted (PERMANENT_BAN if > 0.95)
GORE_THRESHOLD_MEDIUM = "0.6"         # Human review

# Hate Speech & Offensive Symbols (Nazi, KKK, etc)
OFFENSIVE_THRESHOLD_HIGH = "0.8"      # PERMANENT_BAN
OFFENSIVE_THRESHOLD_MEDIUM = "0.6"    # Human review

# Weapons (Firearms, Knives, Threats)
WEAPON_THRESHOLD_HIGH = "0.8"         # Age-restricted
WEAPON_THRESHOLD_MEDIUM = "0.6"       # Human review

# Recreational Drugs
DRUG_THRESHOLD_HIGH = "0.8"           # Age-restricted
DRUG_THRESHOLD_MEDIUM = "0.6"         # Human review

# Self-Harm (CRITICAL - Lower thresholds)
SELF_HARM_THRESHOLD_HIGH = "0.7"      # PERMANENT_BAN
SELF_HARM_THRESHOLD_MEDIUM = "0.5"    # Human review

# AI-Generated / Deepfake Detection
AI_GENERATED_THRESHOLD_HIGH = "0.8"   # Age-restricted
AI_GENERATED_THRESHOLD_MEDIUM = "0.6" # Human review

# Relay Polling Configuration
RELAY_POLLING_ENABLED = "true"                    # Enable/disable relay polling
RELAY_POLLING_RELAY_URL = "wss://relay.divine.video"  # Relay to poll for new video events
RELAY_POLLING_LOOKBACK_HOURS = "1"                # How far back to look for events (in hours)
RELAY_POLLING_LIMIT = "100"                       # Max events to fetch per poll

# Cron trigger for relay polling - runs every 5 minutes
[triggers]
crons = ["*/5 * * * *"]

# Secrets (set with: wrangler secret put <NAME>)
# SERVICE_API_TOKEN - bearer token for authenticated requests to moderation-api.divine.video
# POLICY_AUD - Zero Trust application audience tag (from Access > Applications > moderation.admin.divine.video > Overview)
# CF_ACCESS_CLIENT_ID - Cloudflare Access service token ID for relay.divine.video
# CF_ACCESS_CLIENT_SECRET - Cloudflare Access service token secret for relay.divine.video
# NOSTR_PRIVATE_KEY - for signing NIP-56 report events to faro.nos.social
# MODERATOR_NSEC - Nostr private key (hex) for signing NIP-32 label events from human moderators
# NOSTR_RELAY_URL - Nostr relay for publishing label events (e.g., wss://relay.divine.video)
# FARO_RELAY_URL - Nostr relay for faro moderation events
# SIGHTENGINE_API_USER - (optional, for fallback)
# SIGHTENGINE_API_SECRET - (optional, for fallback)
# HIVE_API_KEY - Hive.AI V2 API token for AI-generated content and deepfake detection (api.thehive.ai)
# HIVE_VLM_API_KEY - Hive.AI V3 API token for VLM (Vision Language Model) classification
#   Self-serve, uses the chat/completions endpoint at api.thehive.ai/api/v3/chat/completions
#   Pricing: ~$0.001/video (much cheaper than V2 scene classification)
# HIVE_VLM_PROMPT - (optional) Custom prompt for VLM classification (overrides default)
# RELAY_ADMIN_URL - Funnelcake admin API endpoint for cache purge / event deletion
# REALITY_DEFENDER_API_KEY - Reality Defender API key for secondary AI verification (api.prd.realitydefender.xyz)
# ADMIN_PASSWORD_HASH - SHA-256 hash of admin dashboard password
# ATPROTO_LABELER_WEBHOOK_URL - URL of the divine-labeler webhook endpoint (https://labels.divine.video/webhook/moderation-result)
# ATPROTO_LABELER_TOKEN - Bearer token for authenticating to the labeler webhook
